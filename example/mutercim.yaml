# yaml-language-server: $schema=../config/mutercim.schema.json

book:
  title: "Test Book"
  author: "Unknown Author"
  source_langs: [ ar ]
  target_langs: [ tr ]

# Input files (relative to workspace root)
# Simple form: inputs: [./input/book.pdf]
# With per-input pages: "1-50", "1,5,10-20", "all"
inputs:
  - path: ./input/Anfas1.pdf
    pages: "155-160"

# Global page range (fallback for inputs without their own pages)
# pages: all

output: ./output
midstate_dir: ./midstate
dpi: 300

# Sections define the book's internal layout structure.
# Pages not covered by any section default to type: auto.
# If no sections are defined at all, entire book is type: auto.
#
# Section types:
#   skip              - Don't process these pages
#   prose             - Continuous paragraphs (introductions, prefaces)
#   scholarly_entries  - Numbered entries + footnotes with source codes (hadith, athar)
#   reference_table   - Key-value reference data (abbreviation keys → auto-staged)
#   toc               - Table of contents
#   index             - Alphabetical index
#   auto              - AI detects layout (default for unconfigured pages)
sections: [ ]

# Model configuration
read:
  provider: gemini
  model: gemini-2.5-flash-lite
  #  provider: ollama
  #  model: qwen2.5vl:7b
  concurrency: 1

translate:
  provider: gemini
  model: gemini-2.5-flash-lite
  #  provider: ollama
  #  model: qwen3:14b
  context_window: 2

write:
  formats: [ md, latex ]
  expand_sources: true
  latex_docker_image: mutercim/xelatex:latest
  skip_pdf: false

# Knowledge paths (relative to workspace root)
knowledge:
  dir: ./knowledge

# Processing behavior
retry:
  max_attempts: 3
  backoff_seconds: 2

rate_limit:
  requests_per_minute: 14
