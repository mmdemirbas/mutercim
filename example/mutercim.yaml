# yaml-language-server: $schema=../config/mutercim.schema.json

inputs: [ { path: ./Anfas1.pdf, pages: "156", languages: [ ar ] } ]
knowledge: [ ./glossary.yaml ]
output: ./output

pages:
  dpi: 300

read:
  debug: true
  layout_tool: "doclayout-yolo"
  # Tuning parameters for the layout tool (doclayout-yolo).
  # These control how aggressively the YOLO model detects and merges regions.
  # Use with read.debug: true to visualize the effect on debug overlay images.
  #
  #   confidence — minimum detection score to keep (0.0–1.0, default 0.2)
  #     Lower → more detections (finer, possibly noisy)
  #     Higher → fewer detections (only high-certainty regions)
  #   iou — IoU threshold for non-maximum suppression (0.0–1.0, default 0.7)
  #     Lower → more aggressive merging of overlapping boxes
  #     Higher → allows more overlapping detections to coexist
  #   image_size — input resolution for inference in pixels (default 1024)
  #     Larger → more detail for the model, slower inference
  #   max_det — maximum detections per page (default 300)
  layout_tool_params:
    confidence: 0.15
    iou: 0.3
    image_size: 1280
  models:
    - { provider: gemini, model: gemini-2.5-flash-lite }
    - { provider: gemini, model: gemini-2.5-flash }
    - { provider: groq, model: llama-3.2-90b-vision-preview }
    - { provider: ollama, model: qwen2.5vl:7b }
  concurrency: 1
  retry:
    max_attempts: 0
    backoff_seconds: 2

translate:
  languages: [ ar, en, tr ]
  models:
    - { provider: groq, model: llama-3.3-70b-versatile }
    - { provider: gemini, model: gemini-2.5-flash-lite }
    - { provider: mistral, model: mistral-small-latest }
    - { provider: gemini, model: gemini-2.5-flash }
    - { provider: openrouter, model: meta-llama/llama-3.3-70b-instruct:free }
    - { provider: ollama, model: qwen3:14b }
  context_window: 2

write:
  formats: [ md, latex, docx, pdf ]
  expand_sources: true
