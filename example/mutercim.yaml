# yaml-language-server: $schema=../config/mutercim.schema.json
#
# mutercim — full configuration reference
#
# All keys shown below with their default values and allowed options.
# Copy this file to your workspace root as "mutercim.yaml" and customize.

# ─── Book metadata ───────────────────────────────────────────────────────────

book:
  title: "Anfas1-demo"               # Book title — used as output filename: write/tr/<title>.md, .tex, .pdf, .docx
                                     #   OS-prohibited chars replaced with -, falls back to "book" if empty
  source_langs: [ ar ]               # Source language codes — primary (first) used for source markdown and AI prompts
  target_langs: [ ar, en, tr ]       # Target language codes — each gets its own translate/ and write/ subdirectory

# ─── Inputs ──────────────────────────────────────────────────────────────────
#
# Input files or directories to process.
# PDFs are converted to page images via pdftoppm; image directories used as-is.
# Filename stem (e.g. "vol1" from "vol1.pdf") becomes subdirectory name under pages/, read/, solve/.
# Multiple inputs are processed independently, then merged in the write phase.
#
#   inputs:
#     - path: ./input/vol1.pdf
#       pages: "1-50"
#     - path: ./input/vol2.pdf
#       pages: "10-20,30-40"
#     - path: ./input/vol3.pdf       # all pages (default when pages omitted)

inputs:
  - path: ./input/Anfas1.pdf          # Path to input PDF or image directory (relative to workspace root)
    pages: "156-157,159"              # Page range for this input: "1-10,20-30" or "all" (default)

knowledge_dir: ./knowledge           # Knowledge YAML files directory (phrases, people, terms, places, sources)
                                     #   Merged with embedded defaults and auto-extracted memory/ entries

# ─── PDF conversion ──────────────────────────────────────────────────────────

dpi: 300                             # DPI for PDF-to-image conversion (min: 72) — higher = better OCR, larger files

# ─── Sections ────────────────────────────────────────────────────────────────
#
# Book section definitions — controls how the AI reads and translates page ranges.
# Pages not covered by any section default to type: auto.
#
# Section types:
#   skip              — Exclude from processing entirely
#   prose             — Continuous paragraphs (introductions, prefaces)
#   scholarly_entries  — Numbered entries + footnotes with source codes (hadith collections)
#   reference_table   — Source abbreviation lists (auto-staged to memory/ for resolution)
#   toc               — Table of contents
#   index             — Alphabetical index
#   auto              — AI detects layout (default for uncovered pages)

sections: []
# sections:
#   - name: Front matter             # Section name — shown in logs and status display
#     pages: "1-10"                  # Page range this section covers
#     type: skip                     # Layout type (see list above)
#     translate: false               # Whether to translate (default: true)
#   - name: Introduction
#     pages: "11-20"
#     type: prose
#   - name: Main content
#     pages: "21-600"
#     type: scholarly_entries
#   - name: Abbreviations
#     pages: "601-605"
#     type: reference_table          # Entries auto-staged to memory/ for source resolution
#     translate: false
#   - name: Index
#     pages: "606-612"
#     type: index
#     translate: false

# ─── Read phase (OCR/vision) ─────────────────────────────────────────────────
#
# Sends page images to AI vision models to extract structured JSON.
# Models are tried in order; on 429/quota exhaustion, fails over to next.
# All models here must support vision (image input).
#
# Providers:  gemini | claude | openai | groq | mistral | openrouter | xai | ollama
# Default RPMs: gemini=10, groq=30, mistral=60, openrouter=20, openai=500, ollama=1000
#
# Per-model options:
#   rpm:      Requests per minute override (0 = provider default)
#   vision:   Vision support override (true/false, null = auto-detect)
#   base_url: Custom API URL (for self-hosted OpenAI-compatible endpoints)
#
# API keys: put in .env file (GEMINI_API_KEY, GROQ_API_KEY, etc.)
#   Gemini:     aistudio.google.com
#   Groq:       console.groq.com — instant, no credit card
#   Mistral:    console.mistral.ai — free tier available
#   xAI:        console.x.ai — $25 free credits on signup
#   OpenRouter: openrouter.ai — free models available immediately

read:
  models:                            # Ordered failover chain — first is primary
    # 1. Gemini Flash-Lite: best free vision quota (1,000 RPD, 15 RPM)
    - provider: gemini
      model: gemini-2.5-flash-lite
    # 2. Gemini Flash: higher quality, lower quota (250 RPD, 10 RPM)
    - provider: gemini
      model: gemini-2.5-flash
    # 3. Groq: fast, vision via Llama (1,000 RPD, 30 RPM)
    - provider: groq
      model: llama-3.2-90b-vision-preview
    # 4. xAI: $25 free credits, good vision
    #- provider: xai
    #  model: grok-2-vision-latest
    # 5. Local fallback: always available, slow
    - provider: ollama
      model: qwen2.5vl:7b
  concurrency: 1                     # Parallel read workers (min: 1) — currently only 1 supported

# ─── Translation phase ───────────────────────────────────────────────────────
#
# Sends structured page data to AI with knowledge-enriched prompts.
# Vision is NOT required — text-only models work here.
# Knowledge (honorifics, sources, terminology) is injected into the system prompt.

translate:
  models:                            # Ordered failover chain — vision not required
    # 1. Groq: fastest inference, good Arabic (1,000 RPD, 30 RPM)
    - provider: groq
      model: llama-3.3-70b-versatile
    # 2. Gemini Flash-Lite: good quality (1,000 RPD, 15 RPM)
    - provider: gemini
      model: gemini-2.5-flash-lite
    # 3. Mistral: massive free quota (~1B tokens/month)
    - provider: mistral
      model: mistral-small-latest
    # 4. Gemini Flash: higher quality fallback (250 RPD)
    - provider: gemini
      model: gemini-2.5-flash
    # 5. xAI: $25 free credits
    #- provider: xai
    #  model: grok-2-latest
    # 6. OpenRouter: community-funded free models
    - provider: openrouter
      model: meta-llama/llama-3.3-70b-instruct:free
    # 7. Local fallback
    - provider: ollama
      model: qwen3:14b
  context_window: 2                  # Previous pages included for continuity (min: 0, higher = more tokens)

# ─── Write phase ─────────────────────────────────────────────────────────────
#
# Renders translated data into final output files under write/<lang>/.
# Files are named after book.title (sanitized).

write:
  formats: [md, latex, docx, pdf]    # Output formats: md | latex (.tex only) | pdf (.tex + compile) | docx (via pandoc)
  expand_sources: true               # Expand source abbreviations in output (e.g. خ → Sahîh-i Buhârî)
  latex_docker_image: mutercim/xelatex:latest  # Docker image for LaTeX→PDF compilation (needs xelatex + Arabic fonts)

# ─── Retry settings ──────────────────────────────────────────────────────────
#
# Applies to both read and translate API calls.
# Respects Retry-After headers (capped at 30s).

retry:
  max_attempts: 3                    # Max retries per API call before marking page as failed (min: 0)
  backoff_seconds: 2                 # Base backoff in seconds, exponential: 2s, 4s, 8s... (min: 1)

# ─── Rate limiting (global fallback) ─────────────────────────────────────────
#
# Per-model RPM in the models list takes precedence.
# Only used when a model doesn't specify its own rpm value.

rate_limit:
  requests_per_minute: 14            # Max API requests per minute (min: 1)
