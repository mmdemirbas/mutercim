# yaml-language-server: $schema=../config/mutercim.schema.json
#
# mutercim — full configuration reference
#
# All keys shown below with their default values and allowed options.
# Copy this file to your workspace root as "mutercim.yaml" and customize.

# ─── Inputs ──────────────────────────────────────────────────────────────────
#
# Input files or directories to process.
# PDFs are converted to page images via pdftoppm; image directories used as-is.
# Filename stem (e.g. "vol1" from "vol1.pdf") becomes subdirectory name under pages/, read/, solve/.
# Multiple inputs are processed independently, then merged in the write phase.
# Each input declares its own source languages.
#
#   inputs:
#     - path: ./input/vol1.pdf
#       pages: "1-50"
#       languages: [ar]
#     - path: ./input/vol2.pdf
#       pages: "10-20,30-40"
#       languages: [ar, fa]
#     - path: ./input/vol3.pdf       # all pages (default when pages omitted)
#       languages: [ar]

inputs:
  - path: ./input                    # Path to input PDF or image directory (relative to workspace root)
    pages: all                       # Page range for this input: "1-10,20-30" or "all" (default)
    languages: [ar]                  # Source language codes — primary (first) used for source markdown and AI prompts

# Knowledge: list of YAML files and/or directories.
# Directories include all .yaml/.yml files. Merged with auto-extracted memory/ entries.
knowledge:
  - ./knowledge                      # directory: loads all .yaml/.yml files inside
  # - ./extra-glossary.yaml          # file: loaded directly

output: ./

# ─── Cut phase (PDF → images) ────────────────────────────────────────────────

cut:
  dpi: 300                           # DPI for PDF-to-image conversion (min: 72) — higher = better OCR, larger files

# ─── Layout phase (region detection) ────────────────────────────────────────
#
# Detects document regions (headers, columns, tables, footnotes) with bounding
# boxes on page images. Output is used by the read phase to guide OCR.
# When tool is empty, layout phase is skipped and read uses AI-only mode.
# Each layout tool interprets its own params. Unknown keys are logged and ignored.
#
# Choose ONE of the tool sections below and uncomment it.

# --- Option A: DocLayout-YOLO (default, recommended) ---
# Best for multi-column layouts with distinct document structure.
# Detects: headers, text blocks, tables, figures, footnotes, page numbers.
# Does NOT extract text — only bounding boxes and types.
#
# Params:
#   confidence (float, default 0.2)
#     Minimum detection score to keep a region (0.0–1.0).
#     Lower → more detections (finer granularity, possibly noisy).
#     Higher → fewer detections (only high-certainty regions).
#   iou (float, default 0.7)
#     IoU threshold for non-maximum suppression (0.0–1.0).
#     Lower → more aggressive merging of overlapping boxes.
#     Higher → allows more overlapping detections to coexist.
#   image_size (int, default 1024)
#     Input image size in pixels for model inference. The model resizes
#     the page to this size internally. Larger → more detail, slower.
#   max_det (int, default 300)
#     Maximum number of detections per page image.
layout:
  tool: doclayout-yolo               # "doclayout-yolo", "surya", or "" (disabled)
  debug: false                       # write overlay PNGs to layout/<input>/debug/
  # params:                          # Uncomment to tune (use debug: true to see results)
  #   confidence: 0.2                # min detection score, 0.0–1.0 (default 0.2)
  #   iou: 0.7                       # NMS overlap threshold, 0.0–1.0 (default 0.7)
  #   image_size: 1024               # inference resolution in px (default 1024)
  #   max_det: 300                   # max detections per page (default 300)

# --- Option B: Surya OCR ---
# Detects text lines with preliminary OCR text.
# Better for text-line-level detection.
#
# Params:
#   languages (string, auto from inputs[].languages)
#     Comma-separated OCR language codes for text recognition.
#     Automatically set from the input's source languages if not specified.
#     Examples: "ar", "ar,fa", "en,tr"
# layout:
#   tool: surya
#   debug: false
#   params:
#     languages: "ar,fa"             # auto-set from inputs[].languages if omitted

# --- Option C: Disabled (AI-only) ---
# The read phase handles everything — layout detection + OCR + text extraction.
# Simpler documents, or when Docker is unavailable.
# layout:
#   tool: ""

# ─── Read phase (OCR/vision) ─────────────────────────────────────────────────
#
# Sends page images (+ layout regions if available) to AI vision models to extract structured JSON.
# If layout output exists, the LLM refines region types and extracts text.
# If not, the LLM detects regions from scratch (AI-only mode).
#
# Models are tried in order; on 429/quota exhaustion, fails over to next.
# All models here must support vision (image input).
#
# Providers:  gemini | claude | openai | groq | mistral | openrouter | xai | ollama
# Default RPMs: gemini=10, groq=30, mistral=60, openrouter=20, openai=500, ollama=1000
#
# Per-model options:
#   rpm:      Requests per minute override (0 = provider default)
#   vision:   Vision support override (true/false, null = auto-detect)
#   base_url: Custom API URL (for self-hosted OpenAI-compatible endpoints)
#
# API keys: put in .env file (GEMINI_API_KEY, GROQ_API_KEY, etc.)
#   Gemini:     aistudio.google.com
#   Groq:       console.groq.com — instant, no credit card
#   Mistral:    console.mistral.ai — free tier available
#   xAI:        console.x.ai — $25 free credits on signup
#   OpenRouter: openrouter.ai — free models available immediately

read:
  models:                            # Ordered failover chain — first is primary
    # 1. Gemini Flash-Lite: best free vision quota (1,000 RPD, 15 RPM)
    - { provider: gemini, model: gemini-2.5-flash-lite }
    # 2. Gemini Flash: higher quality, lower quota (250 RPD, 10 RPM)
    - { provider: gemini, model: gemini-2.5-flash }
    # 3. Groq: fast, vision via Llama (1,000 RPD, 30 RPM)
    - { provider: groq, model: llama-3.2-90b-vision-preview }
    # 4. xAI: $25 free credits, good vision
    - { provider: xai, model: grok-2-vision-latest }
    # 5. Local fallback: always available, slow
    - { provider: ollama, model: qwen2.5vl:7b }
  concurrency: 1                     # Parallel read workers (min: 1) — currently only 1 supported
  retry:
    max_attempts: 3                  # Max retries per API call before marking page as failed (min: 0)
    backoff_seconds: 2               # Base backoff in seconds, exponential: 2s, 4s, 8s... (min: 1)

# ─── Translation phase ───────────────────────────────────────────────────────
#
# Sends structured page data to AI with knowledge-enriched prompts.
# Vision is NOT required — text-only models work here.
# Glossary knowledge is injected into the system prompt.

translate:
  languages: [tr]                    # Target language codes — each gets its own translate/ and write/ subdirectory
  models:                            # Ordered failover chain — vision not required
    # 1. Groq: fastest inference, good Arabic (1,000 RPD, 30 RPM)
    - { provider: groq, model: llama-3.3-70b-versatile }
    # 2. Gemini Flash-Lite: good quality (1,000 RPD, 15 RPM)
    - { provider: gemini, model: gemini-2.5-flash-lite }
    # 3. Mistral: massive free quota (~1B tokens/month)
    - { provider: mistral, model: mistral-small-latest }
    # 4. Gemini Flash: higher quality fallback (250 RPD)
    - { provider: gemini, model: gemini-2.5-flash }
    # 5. xAI: $25 free credits
    - { provider: xai, model: grok-2-latest }
    # 6. OpenRouter: community-funded free models
    - { provider: openrouter, model: meta-llama/llama-3.3-70b-instruct:free }
    # 7. Local fallback
    - { provider: ollama, model: qwen3:14b }
  context_window: 2                  # Previous pages included for continuity (min: 0, higher = more tokens)
  retry:
    max_attempts: 3                  # Max retries per API call before marking page as failed (min: 0)
    backoff_seconds: 2               # Base backoff in seconds, exponential: 2s, 4s, 8s... (min: 1)

# ─── Write phase ─────────────────────────────────────────────────────────────
#
# Renders translated data into final output files under write/<lang>/.
# Output files are named "book" (fixed).

write:
  formats: [md, latex, docx, pdf]    # Output formats: md | latex (.tex only) | pdf (.tex + compile) | docx (via pandoc)
  expand_sources: true               # Expand source abbreviations in output (e.g. خ → Sahîh-i Buhârî)
