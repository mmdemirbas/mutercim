version: '3'

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task -l

  all:
    desc: Build, vet, test, and install
    deps: [ build, vet, test, install ]

  clean:
    desc: Clean up build artifacts
    cmds:
      - rm -rf build dist

  build:
    desc: Build for the current platform
    cmds:
      - go build -o build/mutercim ./cmd/mutercim

  vet:
    desc: Run static analysis
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...
      - go test -race ./...

  install:
    desc: Install mutercim and set up shell completion
    cmds:
      - go install ./cmd/mutercim
      - mkdir -p ~/.zfunc
      - mutercim completion zsh > ~/.zfunc/_mutercim

  uninstall:
    desc: Remove mutercim binary and shell completion
    cmds:
      - rm -f $(go env GOPATH)/bin/mutercim
      - rm -f ~/.zfunc/_mutercim

  dist:
    desc: Build for all platforms
    cmds:
      - GOOS=linux GOARCH=amd64 go build -o dist/linux_amd64/mutercim ./cmd/mutercim
      - GOOS=linux GOARCH=arm64 go build -o dist/linux_arm64/mutercim ./cmd/mutercim
      - GOOS=windows GOARCH=amd64 go build -o dist/windows_amd64/mutercim ./cmd/mutercim
      - GOOS=darwin GOARCH=arm64 go build -o dist/darwin_arm64/mutercim ./cmd/mutercim

  schema:
    desc: Regenerate config/mutercim.schema.json from Go types
    cmds:
      - go run ./cmd/gen-schema
    sources:
      - internal/config/schema.go
      - internal/config/config.go
      - internal/model/section.go
      - internal/model/book.go
    generates:
      - config/mutercim.schema.json

  docker-all:
    desc: Build all Docker images
    deps: [ docker-poppler, docker-pandoc, docker-doclayout, docker-surya, docker-xelatex ]

  docker-poppler:
    desc: Build the Poppler (pdftoppm) Docker image
    cmds:
      - docker build -t mutercim/poppler docker/poppler/

  docker-pandoc:
    desc: Build the Pandoc Docker image
    cmds:
      - docker build -t mutercim/pandoc docker/pandoc/

  docker-doclayout:
    desc: Build the DocLayout-YOLO Docker image
    cmds:
      - docker build -t mutercim/doclayout-yolo docker/doclayout-yolo/

  docker-surya:
    desc: Build the Surya Docker image
    cmds:
      - docker build -t mutercim/surya docker/surya/

  docker-xelatex:
    desc: Build the XeLaTeX Docker image
    cmds:
      - docker build -t mutercim/xelatex docker/xelatex/

  run:
    desc: Run mutercim passing the arguments
    deps: [ build ]
    cmds:
      - ./build/mutercim "$@"
